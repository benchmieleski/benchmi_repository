<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben Chmieleski | Home</title>
    <style>
        /* ==========================================
           1. CORE THEME & LAYOUT VARIABLES
           ========================================== */
        :root {
            --bg-main: #ffffff;
            --text-base: #1a1a1a;
            --theme-c1: #6cccb6; 
            --theme-c2: #57648a; 
            --theme-c3: #ab5c95; 
            --painting-frame: #6cccb6; 
            
            --desktop-gallery-height: 85vh;
            --desktop-painting-height: 60vh;

            /* Mobile Tuning */
            --mobile-header-top: 20px;
            --mobile-gallery-top: 40px; 
            --mobile-painting-height: 55vh;
            --mobile-contact-font: 0.85rem; /* Adjusts contact link size */
        }

        /* ==========================================
           2. GLOBAL & HEADER STYLES
           ========================================== */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            overflow: hidden;
            background: var(--bg-main);
            color: var(--text-base);
            font-family: sans-serif;
            height: 100vh;
            transition: background 0.4s, color 0.4s;
        }

        header { 
            position: fixed; top: 40px; left: 40px; right: 40px; 
            z-index: 1000; display: flex; align-items: flex-start; 
        }

        .site-name-wrapper { display: inline-flex; flex-direction: column; cursor: pointer; padding-bottom: 30px; align-items: flex-start; }
        .site-name { font-size: 2rem; font-weight: bold; line-height: 1.2; margin: 0; }
        .site-subheading { font-size: 1.25rem; line-height: 1.2; margin: 2px 0 12px; }

        .nav-menu { display: none; flex-direction: row; align-items: center; gap: 20px; }
        .site-name-wrapper:hover .nav-menu { display: flex; }
        .nav-links-column { display: flex; flex-direction: column; gap: 6px; }
        .nav-link { font-size: 0.9rem; font-weight: bold; text-decoration: none; cursor: pointer; }

        .inv-grad-box {
            background: linear-gradient(to right, var(--theme-c1), var(--theme-c2), var(--theme-c3), var(--theme-c1));
            background-size: 400% auto;
            animation: gradient-flow 18s linear infinite;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .no-grad { -webkit-text-fill-color: var(--text-base) !important; background: none !important; }
        @keyframes gradient-flow { to { background-position: 400% center; } }

        .color-controls-dropdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .theme-option { cursor: pointer; border: 1px solid var(--theme-c3); padding: 1px; background: #fff; display: flex; height: 20px; }
        .theme-option.active { border: 2px solid var(--text-base); }
        .swatch { width: 10px; height: 10px; margin: 0 1px; }

        /* ==========================================
           3. GALLERY
           ========================================== */
        .gallery-container {
            position: absolute; bottom: 0; width: 100vw; 
            height: var(--desktop-gallery-height);
            display: flex; align-items: center; 
            overflow-x: auto; overflow-y: hidden;
        }

        .scroll-wrapper { 
            display: flex; width: max-content; padding: 0 100px; 
            animation: slow-scroll 80s linear infinite; 
        }
        .scroll-wrapper:hover, .scroll-wrapper.paused { animation-play-state: paused; }

        @keyframes slow-scroll { 
            from { transform: translate3d(0, 0, 0); } 
            to { transform: translate3d(-50%, 0, 0); } 
        }

        .item-wrapper { 
            height: var(--desktop-painting-height); margin: 0 40px; 
            padding: 5px; background: var(--painting-frame); 
            transition: 0.6s; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .painting { height: 100%; display: block; background: #fff; }

        /* ==========================================
           4. MODAL & CONTACT UI
           ========================================== */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg-main); padding: 40px; border: 2px solid var(--theme-c1);
            z-index: 2000; text-align: center; max-width: 90vw;
        }
        .contact-row {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap; /* Prevents wrapping to second line */
            gap: 12px;
            margin-top: 10px;
        }
        .contact-row a { color: inherit; text-decoration: underline; white-space: nowrap; }

        #modal-body img { max-height: 60vh; max-width: 100%; object-fit: contain; }
        .close-btn { margin-top: 25px; font-size: 0.6rem; font-weight: bold; cursor: pointer; border: 1px solid var(--theme-c3); color: var(--theme-c3); padding: 5px 15px; background: none; }

        /* ==========================================
           5. MOBILE OVERRIDES
           ========================================== */
        @media (max-width: 768px) {
            header { position: relative; top: var(--mobile-header-top); left: 20px; right: 20px; }
            .gallery-container { position: relative; height: auto; padding-top: var(--mobile-gallery-top); margin-top: 20px; }
            .item-wrapper { height: var(--mobile-painting-height); margin: 0 20px; }
            .nav-menu { margin-top: 10px; }
            .contact-row { font-size: var(--mobile-contact-font); gap: 8px; }
        }
    </style>
</head>
<body>

    <header>
       <div class="site-name-wrapper" onclick="window.location.href=window.location.origin">
            <div class="site-name inv-grad-box">Ben Chmieleski</div>
            <div class="site-subheading inv-grad-box">Artist | Designer | Creator</div>
            <nav class="nav-menu">
                <div class="nav-links-column">
                    <a class="nav-link inv-grad-box" onclick="event.stopPropagation(); openSection('about')">About</a>
                    <a class="nav-link inv-grad-box" onclick="event.stopPropagation(); openSection('contact')">Contact</a>
                </div>
                <div class="color-controls-dropdown">
                    <div class="theme-option active" onclick="event.stopPropagation(); setTheme('misty', this)"><div class="swatch" style="background:#6cccb6"></div><div class="swatch" style="background:#57648a"></div><div class="swatch" style="background:#ab5c95"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('electric', this)"><div class="swatch" style="background:#d9b3f2"></div><div class="swatch" style="background:#b3d9d9"></div><div class="swatch" style="background:#efb9da"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('monochromeDark', this)" style="background:#000;"><div class="swatch" style="background:#fff"></div><div class="swatch" style="background:#fff"></div><div class="swatch" style="background:#fff"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('monochromeStatic', this)"><div class="swatch" style="background:#000"></div><div class="swatch" style="background:#000"></div><div class="swatch" style="background:#000"></div></div>
                </div>
            </nav>
        </div>
    </header>

    <div class="gallery-container">
        <div class="scroll-wrapper" id="gallery-wrapper"></div>
    </div>

    <div id="modal">
        <div id="modal-body"></div>
        <button class="close-btn" onclick="closeModal()">Close</button>
    </div>

    <script>
        const feedItems = [
            { path: 'art_flowers.jpg', title: 'Flowers', description: 'oil on paper, 2025' },
            { path: 'art_garden.jpg', title: 'Garden', description: 'oil on paper, 2025' },
            { path: 'art_riverside.jpg', title: 'Riverside', description: 'oil on paper, 2025' },
            { path: 'art_sunset.jpg', title: 'Sunset', description: 'oil on paper, 2025' },
            { path: 'art_bella.jpg', title: 'Botanics', description: 'acrylic on wood, 2026' }
        ];

        const themes = {
            misty: { colors: ['#6cccb6', '#57648a', '#ab5c95'], bg: '#fff', text: '#1a1a1a' }, 
            electric: { colors: ['#d9b3f2', '#b3d9d9', '#efb9da'], bg: '#fff', text: '#1a1a1a' },
            monochromeDark: { colors: ['#ffffff', '#ffffff', '#ffffff'], bg: '#000', text: '#f0f0f0' },
            monochromeStatic: { colors: ['#000', '#000', '#000'], bg: '#fff', text: '#1a1a1a' }
        };

        let activeTheme = 'misty';

        function init() {
            const gWrapper = document.getElementById('gallery-wrapper');
            const gHtml = feedItems.map((item, idx) => `
                <div class="item-wrapper" onclick="openItem(${idx})">
                    <img src="${item.path}" class="painting" alt="${item.title}">
                </div>
            `).join('');
            gWrapper.innerHTML = gHtml + gHtml;
        }

        function openItem(index) {
            const item = feedItems[index];
            const body = document.getElementById('modal-body');
            const gradClass = activeTheme === 'monochromeStatic' ? 'inv-grad-box no-grad' : 'inv-grad-box';
            body.innerHTML = `
                <img src="${item.path}">
                <h3 class="${gradClass}" style="margin-top:15px; font-size: 1.2rem;">${item.title}</h3>
                <p>${item.description}</p>
            `;
            document.getElementById('modal').style.display = 'block';
        }

        function openSection(type) {
            const body = document.getElementById('modal-body');
            const gradClass = activeTheme === 'monochromeStatic' ? 'inv-grad-box no-grad' : 'inv-grad-box';
            
            if (type === 'about') {
                body.innerHTML = `<h3 class="${gradClass}" style="font-size: 1.5rem;">Ben Chmieleski</h3><p>Artist & Designer located in West Michigan.</p>`;
            } else {
                body.innerHTML = `
                    <h3 class="${gradClass}" style="font-size: 1.5rem;">Contact</h3>
                    <div class="contact-row">
                        <a href="mailto:benchmieleski@gmail.com">Email</a>
                        <span>|</span>
                        <a href="https://www.linkedin.com/in/benjamin-chmieleski-29045256/" target="_blank">LinkedIn</a>
                    </div>`;
            }
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function setTheme(key, el) {
            activeTheme = key;
            const t = themes[key];
            const root = document.documentElement.style;
            root.setProperty('--theme-c1', t.colors[0]);
            root.setProperty('--theme-c2', t.colors[1]);
            root.setProperty('--theme-c3', t.colors[2]);
            root.setProperty('--bg-main', t.bg);
            root.setProperty('--text-base', t.text);
            root.setProperty('--painting-frame', key === 'monochromeStatic' ? '#000' : t.colors[0]);
            
            document.querySelectorAll('.inv-grad-box').forEach(b => b.classList.toggle('no-grad', key === 'monochromeStatic'));
            document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
        }

        window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        init();
    </script>
</body>
</html>
