<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben Chmieleski | Home</title>
    <style>
        :root {
            --bg-main: #ffffff;
            --text-base: #1a1a1a;
            --theme-c1: #6cccb6; 
            --theme-c2: #57648a; 
            --theme-c3: #ab5c95; 
            --painting-frame: #6cccb6; 
        }

        /* Global Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--theme-c1); border-radius: 10px; border: 2px solid var(--bg-main); }
        * { scrollbar-width: thin; scrollbar-color: var(--theme-c1) var(--bg-main); box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            overflow-x: hidden;
            background: var(--bg-main);
            color: var(--text-base);
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { 
            position: fixed; top: 0; left: 0; right: 0; 
            padding: 40px;
            z-index: 1000; 
            display: flex; 
            flex-direction: row; 
            align-items: flex-start;
            pointer-events: none;
        }

        .site-name-wrapper { 
            display: inline-flex; flex-direction: column; cursor: pointer; padding-bottom: 30px; 
            pointer-events: auto;
            flex-shrink: 0;
            z-index: 1001;
        }
        .site-name { font-size: 2rem; font-weight: bold; line-height: 1.2; margin: 0; }
        .site-subheading { font-size: 1.25rem; line-height: 1.2; margin: 2px 0 12px; }

        .nav-menu { display: none; flex-direction: row; align-items: center; gap: 20px; }
        .site-name-wrapper:hover .nav-menu { display: flex; }
        .nav-links-column { display: flex; flex-direction: column; gap: 6px; }
        .nav-link { font-size: 0.9rem; font-weight: bold; text-decoration: none; color: inherit; cursor: pointer; }

        .color-controls-dropdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .theme-option { cursor: pointer; border: 1px solid var(--theme-c3); padding: 1px; background: #fff; display: flex; height: 20px; align-items: center; justify-content: center; }
        .theme-option.active { border: 2px solid var(--text-base); }
        .swatch { width: 10px; height: 10px; margin: 0 1px; }

        /* Game Elements */
        .desktop-only { display: flex; }
        #game-easter-egg {
            flex-grow: 1; height: 140px; pointer-events: auto; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: height 0.5s ease-in-out; z-index: 900;
            /* Only the right 50% of this container is clickable */
            clip-path: inset(0 0 0 50%); 
        }
        body.game-on #game-easter-egg { 
            position: absolute; top: 0; left: 0; right: 0; height: 60vh; background: var(--bg-main); 
            clip-path: none; /* Disable restriction once game is active */
        }
        .canvas-container { position: relative; display: none; height: 80%; aspect-ratio: 4 / 3; }
        body.game-on .canvas-container { display: block; }
        #breakoutCanvas { width: 100%; height: 100%; border: 2px solid var(--theme-c1); border-radius: 10px; background: var(--bg-main); }
        #game-hud { display: none; font-size: 0.75rem; font-weight: bold; padding: 10px 0; text-transform: uppercase; letter-spacing: 0.1em; }

        .universal-close {
            display: none; cursor: pointer; position: absolute;
            width: 28px; height: 28px;
            background: var(--bg-main); border: 2px solid var(--theme-c1); border-radius: 4px; 
            color: var(--text-base); font-size: 0.9rem; font-weight: bold;
            align-items: center; justify-content: center; z-index: 2005; top: 0; right: 0; transform: translate(50%, -50%);
        }

        /* Gallery & Themed Scrollbar */
        .gallery-container { 
            flex: 1; 
            width: 100vw; 
            display: flex; 
            align-items: center; 
            overflow-x: auto; 
            overflow-y: hidden;
            transition: flex 0.5s ease-in-out; 
            margin-top: 140px;
            padding-bottom: 25px;
        }
        
        .gallery-container::-webkit-scrollbar { height: 10px; }
        .gallery-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 10px; margin: 0 100px; }
        .gallery-container::-webkit-scrollbar-thumb { background: var(--theme-c1); border-radius: 10px; border: 2px solid var(--bg-main); }

        body.game-on .gallery-container { margin-top: 60vh; flex: 0 0 40vh; }
        .scroll-wrapper { display: flex; width: max-content; padding: 0 100px; animation: slow-scroll 80s linear infinite; }
        .scroll-wrapper:hover { animation-play-state: paused; }
        @keyframes slow-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        
        .item-wrapper { 
            height: 60vh; margin: 20px 40px; 
            padding: 3.5px; 
            background: var(--painting-frame); 
            transition: 0.6s; cursor: pointer; flex-shrink: 0;
            border-radius: 5px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.17); 
            overflow: hidden;
        }
        .item-wrapper:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.24); 
        }
        
        body.game-on .item-wrapper { height: 30vh; } 
        .painting { height: 100%; display: block; background: #fff; border-radius: 4px; }

        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-main); padding: 40px; border: 2px solid var(--theme-c1); z-index: 2000; text-align: center; max-width: 85vw; border-radius: 10px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        #modal-body { max-height: 80vh; overflow-y: auto; }
        #modal-body img { max-height: 60vh; max-width: 100%; border-radius: 5px; }

        @media (max-width: 768px) {
            .desktop-only { display: none !important; }
            header { position: relative; padding: 20px; pointer-events: auto; }
            .nav-menu { display: flex; margin-top: 10px; }
            .gallery-container { margin-top: 20px; overflow-y: auto; display: block; height: auto; }
            .scroll-wrapper { animation: none; display: flex; flex-direction: column; width: 100%; padding: 0 20px; }
            .item-wrapper { height: auto; width: 100%; margin: 0 0 30px 0; }
            .painting { width: 100%; height: auto; }
            body { overflow-y: auto; }
        }

        .inv-grad-box { background: linear-gradient(to right, var(--theme-c1), var(--theme-c2), var(--theme-c3), var(--theme-c1)); background-size: 400% auto; animation: gradient-flow 18s linear infinite; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes gradient-flow { to { background-position: 400% center; } }
    </style>
</head>
<body>

    <header>
       <div class="site-name-wrapper" onclick="window.location.href=window.location.origin">
            <div class="site-name inv-grad-box">Ben Chmieleski</div>
            <div class="site-subheading inv-grad-box">Artist | Designer | Creator</div>
            <nav class="nav-menu">
                <div class="nav-links-column">
                    <a class="nav-link inv-grad-box" onclick="event.stopPropagation(); openSection('about')">About</a>
                    <a class="nav-link inv-grad-box" onclick="event.stopPropagation(); openSection('contact')">Contact</a>
                </div>
                <div class="color-controls-dropdown">
                    <div class="theme-option active" onclick="event.stopPropagation(); setTheme('misty', this)"><div class="swatch" style="background:#6cccb6"></div><div class="swatch" style="background:#57648a"></div><div class="swatch" style="background:#ab5c95"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('electric', this)"><div class="swatch" style="background:#d9b3f2"></div><div class="swatch" style="background:#b3d9d9"></div><div class="swatch" style="background:#efb9da"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('monochromeDark', this)" style="background:#000;"><div class="swatch" style="background:#fff"></div><div class="swatch" style="background:#fff"></div><div class="swatch" style="background:#fff"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('monochromeStatic', this)"><div class="swatch" style="background:#000"></div><div class="swatch" style="background:#000"></div><div class="swatch" style="background:#000"></div></div>
                </div>
            </nav>
        </div>

        <div id="game-easter-egg" class="desktop-only" onclick="handleTriggerClick(event)">
            <div class="canvas-container">
                <canvas id="breakoutCanvas"></canvas>
                <div id="close-game-btn" class="universal-close" onclick="event.stopPropagation(); closeGame()">✕</div>
            </div>
            <div id="game-hud" class="inv-grad-box">Score: 0 | Level: 1 | Lives: 3</div>
        </div>
    </header>

    <div class="gallery-container" id="main-gallery">
        <div class="scroll-wrapper" id="gallery-wrapper"></div>
    </div>

    <div id="modal">
        <div id="modal-close-btn" class="universal-close" style="display:flex;" onclick="closeModal()">✕</div>
        <div id="modal-body"></div>
    </div>

    <script>
        const feedItems = [
            { path: 'art_flowers.jpg', title: 'Flowers', description: 'oil on paper, 2025' },
            { path: 'art_garden.jpg', title: 'Garden', description: 'oil on paper, 2025' },
            { path: 'art_riverside.jpg', title: 'Riverside', description: 'oil on paper, 2025' },
            { path: 'art_sunset.jpg', title: 'Sunset', description: 'oil on paper, 2025' },
            { path: 'art_bella.jpg', title: 'Botanics', description: 'acrylic on wood, 2026' }
        ];

        const gameConfig = { cols: 8, rows: 3, basePaddleWidth: 60, brickHeight: 20, baseSpeed: 3, maxLevels: 3 };
        const themes = {
            misty: { colors: ['#6cccb6', '#57648a', '#ab5c95'], bg: '#fff', text: '#1a1a1a' }, 
            electric: { colors: ['#d9b3f2', '#b3d9d9', '#efb9da'], bg: '#fff', text: '#1a1a1a' },
            monochromeDark: { colors: ['#ffffff', '#ffffff', '#ffffff'], bg: '#000', text: '#f0f0f0' },
            monochromeStatic: { colors: ['#000', '#000', '#000'], bg: '#fff', text: '#1a1a1a' }
        };

        const canvas = document.getElementById('breakoutCanvas');
        const ctx = canvas.getContext('2d');
        const triggerZone = document.getElementById('game-easter-egg');
        const hud = document.getElementById('game-hud');
        const closeBtn = document.getElementById('close-game-btn');
        const gallery = document.getElementById('gallery-wrapper');
        
        let gameActive = false, ballReleased = false, activeTheme = 'misty', gameWon = false;
        let paddleX, paddleWidth, bricks, starRain = [], powerUps = [], balls = [];
        let score = 0, level = 1, lives = 3, frameCount = 0, levelTransitioning = false;

        function updateHud() { if(hud) hud.innerText = `Score: ${score} | Level: ${level} | Lives: ${lives}`; }
        function resetBricks() { bricks = Array.from({length: gameConfig.cols}, () => Array.from({length: gameConfig.rows}, () => ({status: 1}))); }

        function initGame(fullReset = true) {
            if(!canvas) return;
            canvas.width = 400; canvas.height = 300; 
            levelTransitioning = false;
            if (fullReset) { score = 0; level = 1; lives = 3; paddleWidth = gameConfig.basePaddleWidth; resetBricks(); gameWon = false; }
            paddleX = (canvas.width - paddleWidth) / 2;
            ballReleased = false; starRain = []; powerUps = [];
            balls = [{ x: paddleX + paddleWidth / 2, y: canvas.height - 25, dx: gameConfig.baseSpeed + (level * 0.5), dy: -(gameConfig.baseSpeed + (level * 0.5)) }];
            updateHud();
        }

        function spawnPowerUp(x, y) {
            const rand = Math.random();
            if (rand < 0.15) {
                const types = ['shrink', 'expand', 'multi', 'life'];
                const type = rand < 0.03 ? 'life' : types[Math.floor(Math.random() * types.length)];
                powerUps.push({ x, y, type, dy: 1.8 });
            }
        }

        function drawGame() {
            if(!gameActive || !ctx) return;
            frameCount++;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            const style = getComputedStyle(document.documentElement);
            const c1 = style.getPropertyValue('--theme-c1').trim();
            const c2 = style.getPropertyValue('--theme-c2').trim();
            const c3 = style.getPropertyValue('--theme-c3').trim();
            const t = themes[activeTheme];
            
            if (gameWon) {
                ctx.font = "bold 40px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                const grd = ctx.createLinearGradient(0, 0, canvas.width, 0);
                grd.addColorStop(0, c1); grd.addColorStop(0.5, c2); grd.addColorStop(1, c3);
                ctx.fillStyle = grd;
                ctx.fillText("You Win!", canvas.width / 2, canvas.height / 2);
                ctx.font = "bold 15px sans-serif";
                ctx.fillText("Final Score: " + score, canvas.width / 2, (canvas.height / 2) + 40);
            } else if (starRain.length > 0) {
                starRain.forEach((s, i) => {
                    ctx.globalAlpha = s.opacity; ctx.fillStyle = s.color; ctx.fillText("*", s.x, s.y); s.y += s.speed;
                    if (s.y > canvas.height) s.opacity -= 0.01;
                    if (s.opacity <= 0) starRain.splice(i, 1);
                });
                ctx.globalAlpha = 1.0; 
                if (starRain.length === 0 && levelTransitioning) {
                    if (level < gameConfig.maxLevels) {
                        level++; resetBricks(); initGame(false); levelTransitioning = false;
                    } else {
                        gameWon = true; ballReleased = false; levelTransitioning = false;
                    }
                }
            } else {
                let activeCount = 0;
                const padding = 6, bWidth = (canvas.width / gameConfig.cols) - padding, startX = padding / 2;

                bricks.forEach((col, i) => {
                    col.forEach((b, r) => {
                        if(b.status === 1) {
                            activeCount++;
                            const bX = startX + i * (bWidth + padding), bY = r * (gameConfig.brickHeight + padding) + 50;
                            
                            let rowColor;
                            if (activeTheme === 'monochromeStatic') {
                                rowColor = t.text;
                            } else {
                                if (r === 0) rowColor = c1;
                                else if (r === 1) rowColor = c2;
                                else rowColor = c3;
                            }
                            
                            ctx.fillStyle = rowColor;
                            ctx.fillRect(bX, bY, bWidth, gameConfig.brickHeight);
                            
                            balls.forEach(ball => {
                                if(ballReleased && ball.x > bX && ball.x < bX + bWidth && ball.y > bY && ball.y < bY + gameConfig.brickHeight) {
                                    ball.dy = -ball.dy; b.status = 0; score += 1; updateHud(); spawnPowerUp(bX + bWidth/2, bY);
                                }
                            });
                        }
                    });
                });

                if(activeCount === 0 && !levelTransitioning) {
                    levelTransitioning = true; ballReleased = false;
                    for(let i=0; i<30; i++) starRain.push({x: Math.random()*canvas.width, y: -Math.random()*50, speed: 1.5+Math.random(), color: c2, opacity: 1});
                } else {
                    ctx.fillStyle = t.text; ctx.fillRect(paddleX, canvas.height - 15, paddleWidth, 8);
                    
                    powerUps.forEach((p, i) => {
                        p.y += p.dy;
                        ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.stroke();
                        ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
                        ctx.fillStyle = p.type === 'life' ? '#ff4d4d' : t.text;
                        const icon = p.type === 'life' ? "♥" : (p.type === 'expand' ? "+" : (p.type === 'shrink' ? "-" : "3"));
                        ctx.fillText(icon, p.x, p.y + 4);

                        if(p.y > canvas.height - 25 && p.x > paddleX && p.x < paddleX + paddleWidth) {
                            if(p.type === 'life') lives++;
                            if(p.type === 'expand') paddleWidth = Math.min(120, paddleWidth + 20);
                            if(p.type === 'shrink') paddleWidth = Math.max(30, paddleWidth - 15);
                            if(p.type === 'multi') {
                                balls.push({x: balls[0].x, y: balls[0].y, dx: -balls[0].dx, dy: balls[0].dy});
                                balls.push({x: balls[0].x, y: balls[0].y, dx: balls[0].dx * 0.5, dy: balls[0].dy});
                            }
                            updateHud(); powerUps.splice(i, 1);
                        } else if (p.y > canvas.height) powerUps.splice(i, 1);
                    });

                    balls.forEach((ball, i) => {
                        if (!ballReleased) { ball.x = paddleX + paddleWidth / 2; ball.y = canvas.height - 23; }
                        ctx.beginPath(); ctx.arc(ball.x, ball.y, 5, 0, Math.PI*2); ctx.fillStyle = t.text; ctx.fill();
                        if (ballReleased) {
                            if(ball.x + ball.dx > canvas.width || ball.x + ball.dx < 0) ball.dx = -ball.dx;
                            if(ball.y + ball.dy < 0) ball.dy = -ball.dy;
                            else if(ball.y + ball.dy > canvas.height - 15) {
                                if(ball.x > paddleX && ball.x < paddleX + paddleWidth) ball.dy = -ball.dy;
                                else { balls.splice(i, 1); if (balls.length === 0) { lives--; ballReleased = false; if (lives <= 0) initGame(true); else initGame(false); updateHud(); } }
                            }
                            ball.x += ball.dx; ball.y += ball.dy;
                        }
                    });
                }
            }
            requestAnimationFrame(drawGame);
        }

        function handleTriggerClick(e) { 
            if (window.innerWidth <= 768) return; 
            if (!gameActive) { gameActive = true; document.body.classList.add('game-on'); hud.style.display = 'block'; closeBtn.style.display = 'flex'; initGame(true); drawGame(); } 
            else if (!ballReleased) ballReleased = true; 
        }

        triggerZone.onmousemove = e => { if(!gameActive) return; let rect = canvas.getBoundingClientRect(); paddleX = (e.clientX - rect.left) * (canvas.width / rect.width) - paddleWidth / 2; paddleX = Math.max(0, Math.min(canvas.width - paddleWidth, paddleX)); };
        function closeGame() { gameActive = false; document.body.classList.remove('game-on'); hud.style.display = 'none'; closeBtn.style.display = 'none'; }
        function setTheme(key, el) { activeTheme = key; const t = themes[key]; const root = document.documentElement.style; root.setProperty('--theme-c1', t.colors[0]); root.setProperty('--theme-c2', t.colors[1]); root.setProperty('--theme-c3', t.colors[2]); root.setProperty('--bg-main', t.bg); root.setProperty('--text-base', t.text); document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('active')); el.classList.add('active'); }
        function openItem(idx) { const item = feedItems[idx % feedItems.length]; document.getElementById('modal-body').innerHTML = `<img src="${item.path}"><h3 style="margin-top:15px;">${item.title}</h3><p>${item.description}</p>`; document.getElementById('modal').style.display = 'block'; }
        
        function openSection(type) { 
            const body = document.getElementById('modal-body'); 
            body.innerHTML = type === 'about' ? 
                `<h3>Ben Chmieleski</h3>
                 <p>Artist & Designer in West Michigan.</p>
                 <p>I draw my inspiration from nature and the world around me. <br> I believe in the power of art & design and their ability to improve the human condition.</p>` : 
                `<h3>Contact</h3> 
                 <p><a href="mailto:benchmieleski@gmail.com" style="color:inherit; text-decoration:underline;">benchmieleski@gmail.com</a> | <a href="https://www.linkedin.com/public-profile/settings?trk=d_flagship3_profile_self_view_public_profile" target="_blank" style="color:inherit; text-decoration:underline;">LinkedIn</a></p>`; 
            document.getElementById('modal').style.display = 'block'; 
        }
        
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        const isMobileView = window.innerWidth <= 768;
        const galleryHtml = feedItems.map((item, idx) => `<div class="item-wrapper" onclick="openItem(${idx})"><img src="${item.path}" class="painting"></div>`).join('');
        gallery.innerHTML = isMobileView ? galleryHtml : galleryHtml + galleryHtml;
    </script>
</body>
</html>
