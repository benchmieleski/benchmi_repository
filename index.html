<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben Chmieleski | Home</title>
    <style>
        /* Custom Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--theme-c1); border-radius: 10px; border: 2px solid var(--bg-main); }
        ::-webkit-scrollbar-thumb:hover { background: var(--theme-c2); }
        * { scrollbar-width: thin; scrollbar-color: var(--theme-c1) var(--bg-main); }

        :root {
            --bg-main: #ffffff;
            --text-base: #1a1a1a;
            --theme-c1: #6cccb6; 
            --theme-c2: #57648a; 
            --theme-c3: #ab5c95; 
            --painting-frame: #6cccb6; 
        }

        body, html {
            margin: 0; padding: 0;
            overflow: hidden;
            background: var(--bg-main);
            color: var(--text-base);
            font-family: sans-serif;
            height: 100vh;
            transition: background 0.4s, color 0.4s;
        }

        header { 
            position: fixed; top: 40px; left: 40px; right: 40px; 
            z-index: 1000; display: flex; align-items: flex-start; 
        }

        .site-name-wrapper { display: inline-flex; flex-direction: column; cursor: pointer; padding-bottom: 30px; align-items: flex-start; flex-shrink: 0; }
        .site-name { font-size: 2rem; font-weight: bold; line-height: 1.2; margin: 0; text-transform: none; }
        .site-subheading { font-size: 1.25rem; line-height: 1.2; margin: 2px 0 12px; text-transform: none; }

        #game-easter-egg {
            flex-grow: 1;
            height: 120px;
            margin-left: 40px;
            position: relative;
            cursor: crosshair;
        }
        #breakoutCanvas { display: none; width: 100%; height: 100%; }

        .inv-grad-box {
            background: linear-gradient(to right, var(--theme-c1), var(--theme-c2), var(--theme-c3), var(--theme-c1));
            background-size: 400% auto;
            animation: gradient-flow 18s linear infinite;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block; 
        }

        .no-grad { -webkit-text-fill-color: var(--text-base) !important; background: none !important; animation: none !important; }

        @keyframes gradient-flow { to { background-position: 400% center; } }

        .nav-menu { display: none; flex-direction: row; align-items: center; gap: 20px; }
        .site-name-wrapper:hover .nav-menu { display: flex; }
        .nav-links-column { display: flex; flex-direction: column; gap: 6px; }
        .nav-link { font-size: 0.9rem; font-weight: bold; text-decoration: none; transition: 0.2s; cursor: pointer; line-height: 1.2; }
        .nav-link:hover { transform: translateX(3px); opacity: 0.8; }

        .color-controls-dropdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .theme-option { cursor: pointer; border: 1px solid var(--theme-c3); padding: 1px; background: #fff; display: flex; align-items: center; justify-content: center; height: 20px; }
        .theme-option.active { border: 2px solid var(--text-base); }
        .swatch { width: 10px; height: 10px; margin: 0 1px; }

        .gallery-container {
            position: absolute; bottom: 0; width: 100vw; height: 90vh;
            display: flex; align-items: center; overflow-x: auto; overflow-y: hidden;
        }

        .scroll-wrapper { display: flex; width: max-content; padding: 0 100px; animation: slow-scroll 80s linear infinite; }
        .scroll-wrapper:hover { animation-play-state: paused; }
        @keyframes slow-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .item-wrapper { 
            height: 65vh; margin: 0 40px; padding: 5px; background: var(--painting-frame); 
            transition: 0.6s; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .painting { height: 100%; display: block; background: #fff; }

        #modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg-main); padding: 40px; border: 2px solid var(--theme-c1);
            z-index: 2000; text-align: center; color: var(--text-base); max-width: 85vw;
        }
        #modal-body img { max-height: 60vh; max-width: 100%; object-fit: contain; }
        .close-btn { margin-top: 25px; font-size: 0.6rem; font-weight: bold; cursor: pointer; background: none; border: 1px solid var(--theme-c3); color: var(--theme-c3); padding: 5px 15px; }
    </style>
</head>
<body>

    <header>
        <div class="site-name-wrapper" onclick="location.reload()">
            <div class="site-name inv-grad-box">Ben Chmieleski</div>
            <div class="site-subheading inv-grad-box">Artist | Designer | Creator</div>
            <nav class="nav-menu">
                <div class="nav-links-column">
                    <a class="nav-link inv-grad-box" onclick="event.stopPropagation(); openSection('about')">About</a>
                    <a class="nav-link inv-grad-box" onclick="event.stopPropagation(); openSection('contact')">Contact</a>
                </div>
                <div class="color-controls-dropdown">
                    <div class="theme-option active" onclick="event.stopPropagation(); setTheme('misty', this)"><div class="swatch" style="background:#6cccb6"></div><div class="swatch" style="background:#57648a"></div><div class="swatch" style="background:#ab5c95"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('electric', this)"><div class="swatch" style="background:#d9b3f2"></div><div class="swatch" style="background:#b3d9d9"></div><div class="swatch" style="background:#efb9da"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('monochromeDark', this)" style="background:#000; border-color: #555;"><div class="swatch" style="background:#fff"></div><div class="swatch" style="background:#fff"></div><div class="swatch" style="background:#fff"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('monochromeStatic', this)"><div class="swatch" style="background:#000"></div><div class="swatch" style="background:#000"></div><div class="swatch" style="background:#000"></div></div>
                </div>
            </nav>
        </div>
        
        <div id="game-easter-egg">
            <canvas id="breakoutCanvas"></canvas>
        </div>
    </header>

    <div class="gallery-container">
        <div class="scroll-wrapper" id="gallery-wrapper"></div>
    </div>

    <div id="modal">
        <div id="modal-body"></div>
        <button class="close-btn" onclick="closeModal()">Close</button>
    </div>

    <script>
        // --- DATA ---
        const feedItems = [
            { path: 'art_flowers.jpg', title: 'Flowers', description: 'oil on paper, 2025' },
            { path: 'art_garden.jpg', title: 'Garden', description: 'oil on paper, 2025' },
            { path: 'art_riverside.jpg', title: 'Riverside', description: 'oil on paper, 2025' },
            { path: 'art_sunset.jpg', title: 'Sunset', description: 'oil on paper, 2025' },
            { path: 'art_bella.jpg', title: 'Botanics', description: 'acrylic on wood, 2026' }
        ];

        const themes = {
            misty: { colors: ['#6cccb6', '#57648a', '#ab5c95'], bg: '#fff', text: '#1a1a1a' }, 
            electric: { colors: ['#d9b3f2', '#b3d9d9', '#efb9da'], bg: '#fff', text: '#1a1a1a' },
            monochromeDark: { colors: ['#ffffff', '#ffffff', '#ffffff'], bg: '#000', text: '#f0f0f0' },
            monochromeStatic: { colors: ['#000', '#000', '#000'], bg: '#fff', text: '#1a1a1a' }
        };

        let activeTheme = 'misty';

        // --- GAME LOGIC ---
        const canvas = document.getElementById('breakoutCanvas');
        const ctx = canvas.getContext('2d');
        const triggerZone = document.getElementById('game-easter-egg');
        
        let gameActive = false;
        let ballReleased = false;
        let x, y, dx, dy, paddleX, bricks;
        let gradOffset = 0;
        let starRain = [];
        
        const brickRowCount = 2;
        const paddleWidth = 53;  
        const brickHeight = 16;  
        const baseSpeed = 2.7; 

        function initGame() {
            canvas.width = triggerZone.offsetWidth;
            canvas.height = triggerZone.offsetHeight;
            const brickColumnCount = Math.floor(canvas.width / 32);
            paddleX = (canvas.width - paddleWidth) / 2;
            ballReleased = false;
            starRain = [];
            x = paddleX + paddleWidth / 2;
            y = canvas.height - 15; 
            dx = baseSpeed; 
            dy = -baseSpeed;
            bricks = [];
            for(let c=0; c<brickColumnCount; c++) {
                bricks[c] = [];
                for(let r=0; r<brickRowCount; r++) {
                    bricks[c][r] = { status: 1 };
                }
            }
        }

        function createStarRain() {
            const t = themes[activeTheme];
            for (let i = 0; i < 40; i++) {
                starRain.push({
                    x: Math.random() * canvas.width,
                    y: -Math.random() * 100,
                    speed: 1 + Math.random() * 1.5,
                    color: t.colors[Math.floor(Math.random() * t.colors.length)],
                    opacity: 1
                });
            }
        }

        function drawGame() {
            if(!gameActive) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            const t = themes[activeTheme];
            let activeBricks = 0;
            const bWidth = (canvas.width / bricks.length) - 4;

            gradOffset = (gradOffset + 2) % (canvas.width * 2);

            // Winning Sequence
            if (starRain.length > 0) {
                starRain.forEach((s, i) => {
                    ctx.globalAlpha = s.opacity;
                    ctx.fillStyle = s.color;
                    ctx.font = "16px sans-serif";
                    ctx.fillText("*", s.x, s.y);
                    s.y += s.speed;
                    if (s.y > canvas.height) s.opacity -= 0.01;
                    if (s.opacity <= 0) starRain.splice(i, 1);
                });
                ctx.globalAlpha = 1;
                if (starRain.length === 0) {
                    gameActive = false;
                    canvas.style.display = 'none';
                }
            } else {
                // Gameplay
                bricks.forEach((col, i) => {
                    col.forEach((b, r) => {
                        if(b.status === 1) {
                            activeBricks++;
                            const bX = i * (bWidth + 4); 
                            const bY = r * (brickHeight + 12) + 5; 
                            const grad = ctx.createLinearGradient(bX - gradOffset, 0, bX + canvas.width - gradOffset, 0);
                            grad.addColorStop(0, t.colors[0]);
                            grad.addColorStop(0.33, t.colors[1]);
                            grad.addColorStop(0.66, t.colors[2]);
                            grad.addColorStop(1, t.colors[0]);
                            ctx.fillStyle = (activeTheme === 'monochromeStatic') ? t.text : grad;
                            ctx.fillRect(bX, bY, bWidth, brickHeight);
                            if(ballReleased && x > bX && x < bX + bWidth && y > bY && y < bY + brickHeight) {
                                dy = -dy;
                                b.status = 0;
                            }
                        }
                    });
                });

                if(activeBricks === 0) {
                    createStarRain();
                } else {
                    ctx.fillStyle = t.text; 
                    ctx.fillRect(paddleX, canvas.height - 10, paddleWidth, 5);
                    if (!ballReleased) { x = paddleX + paddleWidth / 2; y = canvas.height - 15; }
                    ctx.beginPath(); 
                    ctx.arc(x, y, 4, 0, Math.PI*2); 
                    ctx.fill();
                    if (ballReleased) {
                        if(x + dx > canvas.width || x + dx < 0) dx = -dx;
                        if(y + dy < 0) dy = -dy;
                        else if(y + dy > canvas.height - 10) {
                            if(x > paddleX && x < paddleX + paddleWidth) {
                                let hitPos = (x - (paddleX + paddleWidth / 2)) / (paddleWidth / 2);
                                dx = hitPos * (baseSpeed + 2);
                                dy = -dy;
                            } else { ballReleased = false; }
                        }
                        x += dx; y += dy;
                    }
                }
            }
            requestAnimationFrame(drawGame);
        }

        // --- INTERACTIONS ---
        triggerZone.addEventListener('click', () => {
            if (!gameActive) {
                gameActive = true;
                canvas.style.display = 'block';
                initGame();
                drawGame();
            } else { ballReleased = true; }
        });

        triggerZone.addEventListener('mousemove', e => {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            paddleX = e.clientX - rect.left - paddleWidth / 2;
            if(paddleX < 0) paddleX = 0;
            if(paddleX > canvas.width - paddleWidth) paddleX = canvas.width - paddleWidth;
        });

        // --- SITE FUNCTIONS ---
        function init() {
            const gWrapper = document.getElementById('gallery-wrapper');
            const gHtml = feedItems.map((item, idx) => {
                return `<div class="item-wrapper" onclick="openItem(${idx})"><img src="${item.path}" class="painting" alt="${item.title}"></div>`;
            }).join('');
            gWrapper.innerHTML = gHtml + gHtml;
        }

        function setTheme(key, el) {
            activeTheme = key;
            const t = themes[key];
            const root = document.documentElement.style;
            root.setProperty('--theme-c1', t.colors[0]);
            root.setProperty('--theme-c2', t.colors[1]);
            root.setProperty('--theme-c3', t.colors[2]);
            root.setProperty('--bg-main', t.bg);
            root.setProperty('--text-base', t.text);
            root.setProperty('--painting-frame', key === 'monochromeStatic' ? '#000' : t.colors[0]);
            document.querySelectorAll('.inv-grad-box').forEach(b => b.classList.toggle('no-grad', key === 'monochromeStatic'));
            document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            if(gameActive) initGame(); 
        }

        function openItem(index) {
            const item = feedItems[index];
            const body = document.getElementById('modal-body');
            const gradClass = activeTheme === 'monochromeStatic' ? 'inv-grad-box no-grad' : 'inv-grad-box';
            body.innerHTML = `<img src="${item.path}"><h3 class="${gradClass}" style="margin-top:15px; font-size: 1.2rem;">${item.title}</h3><p>${item.description}</p>`;
            document.getElementById('modal').style.display = 'block';
        }

        function openSection(type) {
            const body = document.getElementById('modal-body');
            const gradClass = activeTheme === 'monochromeStatic' ? 'inv-grad-box no-grad' : 'inv-grad-box';
            body.innerHTML = type === 'about' 
                ? `<h3 class="${gradClass}" style="font-size: 1.5rem;">Ben Chmieleski</h3><p>Artist & Designer located in West Michigan.</p>`
                : `<h3 class="${gradClass}" style="font-size: 1.5rem;">Contact</h3><p>benchmieleski@gmail.com</p>`;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        window.addEventListener('resize', () => { if(gameActive) initGame(); });
        
        init();
    </script>
</body>
</html>
