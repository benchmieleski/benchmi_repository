<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben Chmieleski | Home</title>
    <style>
        /* --- 1. CORE VARIABLES & THEMES --- */
        :root {
            --bg-main: #ffffff;
            --text-base: #1a1a1a;
            --theme-c1: #6cccb6; 
            --theme-c2: #57648a; 
            --theme-c3: #ab5c95; 
            --painting-frame: #6cccb6; 
        }

        /* --- 2. GLOBAL STYLES --- */
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            overflow: hidden;
            background: var(--bg-main);
            color: var(--text-base);
            font-family: sans-serif;
            height: 100vh;
            transition: background 0.4s, color 0.4s;
        }

        /* --- 3. HEADER & NAVIGATION --- */
        header { 
            position: fixed; 
            top: 30px; left: 30px; right: 30px; 
            z-index: 1000; 
            display: flex; 
            align-items: flex-start;
        }

        .site-name-wrapper { display: inline-flex; flex-direction: column; cursor: pointer; padding-bottom: 20px; align-items: flex-start; }
        .site-name { font-size: 1.8rem; font-weight: bold; line-height: 1.2; margin: 0; }
        .site-subheading { font-size: 1.1rem; line-height: 1.2; margin: 2px 0 10px; }

        .nav-menu { display: none; flex-direction: row; align-items: center; gap: 15px; margin-top: 5px; }
        .site-name-wrapper:hover .nav-menu { display: flex; }
        
        .nav-links-column { display: flex; flex-direction: column; gap: 4px; }
        .nav-link { font-size: 0.85rem; font-weight: bold; text-decoration: none; transition: 0.2s; cursor: pointer; }

        /* Theme Pickers */
        .color-controls-dropdown { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .theme-option { cursor: pointer; border: 1px solid var(--theme-c3); padding: 1px; background: #fff; display: flex; height: 18px; align-items: center; }
        .theme-option.active { border: 2px solid var(--text-base); }
        .swatch { width: 8px; height: 8px; margin: 0 1px; }

        /* --- 4. THE GAME CANVAS --- */
        #game-easter-egg { flex-grow: 1; height: 100px; margin-left: 20px; position: relative; cursor: crosshair; display: flex; align-items: center; gap: 10px; }
        #breakoutCanvas { display: none; width: 45%; height: 100%; border: 2px solid var(--theme-c1); }
        #close-game-btn { display: none; cursor: pointer; font-weight: bold; font-size: 1.2rem; color: var(--theme-c3); }

        /* --- 5. GALLERY SCROLL --- */
        .gallery-container {
            position: absolute; 
            top: 180px; /* Provides padding below the contact link */
            bottom: 40px; 
            width: 100vw; 
            display: flex; 
            align-items: center; 
            overflow: hidden;
        }

        .scroll-wrapper { 
            display: flex; 
            width: max-content; 
            height: 100%;
            padding: 0 50px; 
            animation: slow-scroll 60s linear infinite; 
            will-change: transform;
        }
        .scroll-wrapper:hover, .scroll-wrapper.paused { animation-play-state: paused; }

        @keyframes slow-scroll { from { transform: translate3d(0, 0, 0); } to { transform: translate3d(-50%, 0, 0); } }

        .item-wrapper { 
            height: 100%; /* Fills the container height minus padding */
            margin: 0 30px; 
            padding: 8px; 
            background: var(--painting-frame); 
            transition: 0.4s; 
            cursor: pointer; 
            flex-shrink: 0;
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .painting { height: 100%; width: auto; display: block; background: #fff; }

        /* --- 6. MODALS & UI --- */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg-main); padding: 30px; border: 2px solid var(--theme-c1);
            z-index: 2000; text-align: center; max-width: 90vw; width: 450px;
        }
        #modal-body img { max-height: 50vh; max-width: 100%; object-fit: contain; }
        .close-btn { margin-top: 20px; font-size: 0.7rem; font-weight: bold; cursor: pointer; background: none; border: 1px solid var(--theme-c3); color: var(--theme-c3); padding: 5px 15px; }

        /* Utility: Gradient Text */
        .inv-grad-box {
            background: linear-gradient(to right, var(--theme-c1), var(--theme-c2), var(--theme-c3), var(--theme-c1));
            background-size: 400% auto;
            animation: gradient-flow 18s linear infinite;
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .no-grad { -webkit-text-fill-color: var(--text-base) !important; background: none !important; animation: none !important; }
        @keyframes gradient-flow { to { background-position: 400% center; } }

        /* Mobile Specific Tweaks */
        @media (max-width: 600px) {
            header { top: 20px; left: 20px; }
            .site-name { font-size: 1.5rem; }
            .site-subheading { font-size: 1rem; }
            
            /* Increase gallery height on mobile */
            .gallery-container { top: 160px; bottom: 30px; }
            .item-wrapper { margin: 0 15px; padding: 5px; }
            
            /* Keep contact links small and on one line */
            .contact-links { font-size: 0.9rem; white-space: nowrap; }
            .contact-links span { margin: 0 5px !important; }
        }
    </style>
</head>
<body>

    <header>
       <div class="site-name-wrapper" onclick="window.location.href='/'">
            <div class="site-name inv-grad-box">Ben Chmieleski</div>
            <div class="site-subheading inv-grad-box">Artist | Designer | Creator</div>
            <nav class="nav-menu">
                <div class="nav-links-column">
                    <a class="nav-link inv-grad-box" onclick="event.stopPropagation(); openSection('about')">About</a>
                    <a class="nav-link inv-grad-box" onclick="event.stopPropagation(); openSection('contact')">Contact</a>
                </div>
                <div class="color-controls-dropdown">
                    <div class="theme-option active" onclick="event.stopPropagation(); setTheme('misty', this)"><div class="swatch" style="background:#6cccb6"></div><div class="swatch" style="background:#57648a"></div><div class="swatch" style="background:#ab5c95"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('electric', this)"><div class="swatch" style="background:#d9b3f2"></div><div class="swatch" style="background:#b3d9d9"></div><div class="swatch" style="background:#efb9da"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('monochromeDark', this)" style="background:#000;"><div class="swatch" style="background:#fff"></div><div class="swatch" style="background:#fff"></div><div class="swatch" style="background:#fff"></div></div>
                    <div class="theme-option" onclick="event.stopPropagation(); setTheme('monochromeStatic', this)"><div class="swatch" style="background:#000"></div><div class="swatch" style="background:#000"></div><div class="swatch" style="background:#000"></div></div>
                </div>
            </nav>
        </div>
        
        <div id="game-easter-egg">
            <canvas id="breakoutCanvas"></canvas>
            <div id="close-game-btn" onclick="event.stopPropagation(); closeGame()">✕</div>
        </div>
    </header>

    <div class="gallery-container">
        <div class="scroll-wrapper" id="gallery-wrapper"></div>
    </div>

    <div id="modal">
        <div id="modal-body"></div>
        <button class="close-btn" onclick="closeModal()">Close</button>
    </div>

    <script>
        /* --- EDITABLE CONTENT --- */
        const feedItems = [
            { path: 'art_flowers.jpg', title: 'Flowers', description: 'oil on paper, 2025' },
            { path: 'art_garden.jpg', title: 'Garden', description: 'oil on paper, 2025' },
            { path: 'art_riverside.jpg', title: 'Riverside', description: 'oil on paper, 2025' },
            { path: 'art_sunset.jpg', title: 'Sunset', description: 'oil on paper, 2025' },
            { path: 'art_bella.jpg', title: 'Botanics', description: 'acrylic on wood, 2026' }
        ];

        const pageContent = {
            about: "Artist & Designer located in West Michigan.",
            email: "benchmieleski@gmail.com",
            linkedin: "https://www.linkedin.com/in/benjamin-chmieleski-29045256/"
        };

        const themes = {
            misty: { colors: ['#6cccb6', '#57648a', '#ab5c95'], bg: '#fff', text: '#1a1a1a' }, 
            electric: { colors: ['#d9b3f2', '#b3d9d9', '#efb9da'], bg: '#fff', text: '#1a1a1a' },
            monochromeDark: { colors: ['#ffffff', '#ffffff', '#ffffff'], bg: '#000', text: '#f0f0f0' },
            monochromeStatic: { colors: ['#000', '#000', '#000'], bg: '#fff', text: '#1a1a1a' }
        };

        /* --- LOGIC --- */
        let activeTheme = 'misty';
        const canvas = document.getElementById('breakoutCanvas');
        const ctx = canvas.getContext('2d');
        const galleryWrapper = document.getElementById('gallery-wrapper');
        
        function init() {
            const itemsHtml = feedItems.map((item, idx) => `
                <div class="item-wrapper" onclick="openItem(${idx})">
                    <img src="${item.path}" class="painting" alt="${item.title}">
                </div>
            `).join('');
            galleryWrapper.innerHTML = itemsHtml + itemsHtml; // Infinite scroll loop
        }

        function openItem(index) {
            const item = feedItems[index];
            const gradClass = activeTheme === 'monochromeStatic' ? 'inv-grad-box no-grad' : 'inv-grad-box';
            document.getElementById('modal-body').innerHTML = `
                <img src="${item.path}">
                <h3 class="${gradClass}" style="margin-top:15px;">${item.title}</h3>
                <p>${item.description}</p>
            `;
            document.getElementById('modal').style.display = 'block';
        }

        function openSection(type) {
            const body = document.getElementById('modal-body');
            const gradClass = activeTheme === 'monochromeStatic' ? 'inv-grad-box no-grad' : 'inv-grad-box';
            if (type === 'about') {
                body.innerHTML = `<h3 class="${gradClass}">Ben Chmieleski</h3><p>${pageContent.about}</p>`;
            } else {
                body.innerHTML = `
                    <h3 class="${gradClass}">Contact</h3>
                    <p class="contact-links">
                        <a href="mailto:${pageContent.email}" style="color:inherit">Email</a>
                        <span style="margin:0 10px">|</span>
                        <a href="${pageContent.linkedin}" target="_blank" style="color:inherit">LinkedIn</a>
                    </p>`;
            }
            document.getElementById('modal').style.display = 'block';
        }

        function setTheme(key, el) {
            activeTheme = key;
            const t = themes[key];
            const root = document.documentElement.style;
            root.setProperty('--theme-c1', t.colors[0]);
            root.setProperty('--theme-c2', t.colors[1]);
            root.setProperty('--theme-c3', t.colors[2]);
            root.setProperty('--bg-main', t.bg);
            root.setProperty('--text-base', t.text);
            root.setProperty('--painting-frame', key === 'monochromeStatic' ? '#000' : t.colors[0]);
            
            document.querySelectorAll('.inv-grad-box').forEach(b => b.classList.toggle('no-grad', key === 'monochromeStatic'));
            document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        
        init();
        // Game logic (unchanged from index-37.html) follows here if desired...
    </script>
</body>
</html>
